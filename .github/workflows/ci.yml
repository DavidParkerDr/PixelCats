name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore solution
        run: dotnet restore PixelGame.sln

      - name: Build solution (Release, allow warnings)
        run: dotnet build PixelGame.sln --no-restore --configuration Release -p:TreatWarningsAsErrors=false

      - name: Run unit tests (exclude integration)
        run: dotnet test PixelGame.sln --no-build --configuration Release --verbosity normal --filter "Category!=Integration"
